name: Publish npm package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Commit SHA, branch, or tag to publish from"
        required: true
      version:
        description: "Exact npm version to publish, for example 0.1.10-beta.1"
        required: true
      npm_tag:
        description: "npm dist-tag to publish with"
        required: true
        default: "next"
      create_github_release:
        description: "Create or update the matching GitHub release"
        required: true
        default: "true"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.target_ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install npm package
        run: npm ci

      - name: Test package
        run: npm test

      - name: Detect stable release bump commit
        id: stable-bump
        if: github.event_name == 'push' && github.ref_type == 'branch'
        shell: bash
        run: |
          subject="$(git log -1 --pretty=%s)"
          if [[ "$subject" =~ ^chore\(release\):[[:space:]]+bump[[:space:]]+version[[:space:]]+to[[:space:]]+[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Detected stable release bump commit; npm latest will be published by the matching v* tag."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare npm release metadata
        id: release
        if: steps.stable-bump.outputs.skip != 'true'
        shell: bash
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          DISPATCH_NPM_TAG: ${{ github.event.inputs.npm_tag }}
        run: |
          base_version="$(node -p "require('./package.json').version")"
          package_name="$(node -p "require('./package.json').name")"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${DISPATCH_VERSION}"
            tag="${DISPATCH_NPM_TAG}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            if [[ "$version" == *-* ]]; then
              tag="next"
            else
              tag="latest"
            fi
          else
            version="$(node npm/scripts/resolve-prerelease-version.js --package "$package_name" --base "$base_version" --id beta)"
            tag="next"
          fi
          if [[ "$tag" == "latest" && "$version" == *-* ]]; then
            echo "Refusing to publish prerelease version $version with npm dist-tag latest." >&2
            exit 1
          fi
          node npm/scripts/set-package-version.js "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Read package metadata
        id: package
        if: steps.stable-bump.outputs.skip != 'true'
        shell: bash
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether this npm version already exists
        id: npm-version
        if: steps.stable-bump.outputs.skip != 'true'
        shell: bash
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.stable-bump.outputs.skip != 'true' && steps.npm-version.outputs.published != 'true'
        run: npm publish --access public --provenance --tag "${{ steps.release.outputs.tag }}"

      - name: Skip existing npm version
        if: steps.stable-bump.outputs.skip != 'true' && steps.npm-version.outputs.published == 'true'
        run: echo "npm version ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} already exists; skipping publish."

      - name: Create or update GitHub release
        if: steps.stable-bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CREATE_GITHUB_RELEASE: ${{ github.event.inputs.create_github_release }}
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${CREATE_GITHUB_RELEASE}" == "false" ]]; then
            echo "Skipping GitHub release because create_github_release=false."
            exit 0
          fi
          version="${{ steps.release.outputs.version }}"
          npm_tag="${{ steps.release.outputs.tag }}"
          tag_name="v${version}"
          target="$(git rev-parse HEAD)"
          notes_footer="$(printf '\n\n---\n\nnpm package: `%s@%s`\nnpm dist-tag: `%s`\nworkflow run: %s/%s/actions/runs/%s\n' '${{ steps.package.outputs.name }}' "$version" "$npm_tag" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")"
          notes_file=".github/releases/v${version}.md"
          if [[ -f "$notes_file" ]]; then
            notes="$(cat "$notes_file")${notes_footer}"
          else
            notes="$(printf 'Release notes for `%s@%s`.\n' '${{ steps.package.outputs.name }}' "$version")${notes_footer}"
          fi
          create_release_args=()
          edit_release_args=()
          if [[ "$version" == *-* ]]; then
            create_release_args=(--prerelease --latest=false)
            edit_release_args=(--prerelease)
          fi
          if gh release view "$tag_name" >/dev/null 2>&1; then
            gh release edit "$tag_name" --title "$tag_name" --notes "$notes" "${edit_release_args[@]}"
          else
            gh release create "$tag_name" --target "$target" --title "$tag_name" --notes "$notes" "${create_release_args[@]}"
          fi
